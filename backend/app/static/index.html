<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nieuwsbrief-assistent</title>
<style>
  :root { --accent: #FF7200; --bg: #f4f5f7; --panel: #ffffff; --text: #1f2430; --muted: #6a6a6b; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, Arial, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--accent); color: #fff; padding: 14px 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 18px; margin: 0; font-weight: 700; }
  header select { margin-left: auto; padding: 7px 10px; border-radius: 6px; border: none; font-size: 14px; }
  main { flex: 1; overflow-y: auto; padding: 20px; }
  #chat { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
  .msg { padding: 11px 15px; border-radius: 14px; max-width: 80%; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
  .user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .assistant { align-self: flex-start; background: var(--panel); border: 1px solid #e3e5e9; border-bottom-left-radius: 4px; }
  .system { align-self: center; color: var(--muted); font-size: 13px; font-style: italic; }
  .typing { align-self: flex-start; color: var(--muted); font-size: 14px; }
  footer { background: var(--panel); border-top: 1px solid #e3e5e9; padding: 14px 20px; }
  #composer { max-width: 760px; margin: 0 auto; display: flex; gap: 10px; }
  #input { flex: 1; padding: 12px 14px; border: 1px solid #cfd3da; border-radius: 10px; font-size: 15px; resize: none; font-family: inherit; }
  #send { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 0 22px; font-size: 15px; font-weight: 700; cursor: pointer; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
  <header>
    <h1>Nieuwsbrief-assistent</h1>
    <select id="tenant" aria-label="Klant"></select>
  </header>
  <main><div id="chat"></div></main>
  <footer>
    <div id="composer">
      <textarea id="input" rows="2" placeholder="Beschrijf de nieuwsbrief die je wilt maken..."></textarea>
      <button id="send">Stuur</button>
    </div>
  </footer>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");
const tenantSel = document.getElementById("tenant");
let conversationId = null;

function addMsg(role, text) {
  const el = document.createElement("div");
  el.className = "msg " + role;
  el.textContent = text;
  chat.appendChild(el);
  chat.parentElement.scrollTop = chat.parentElement.scrollHeight;
  return el;
}

async function loadTenants() {
  try {
    const res = await fetch("/tenants");
    const tenants = await res.json();
    if (!tenants.length) { addMsg("system", "Geen klanten gevonden. Maak eerst een tenant aan."); return; }
    for (const t of tenants) {
      const opt = document.createElement("option");
      opt.value = t.id;
      opt.textContent = t.name;
      tenantSel.appendChild(opt);
    }
    addMsg("assistant", "Waar wil je dat ik de nieuwsbrief over schrijf?");
  } catch (e) {
    addMsg("system", "Kon klanten niet laden: " + e.message);
  }
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  addMsg("user", text);
  send.disabled = true; input.disabled = true;
  const typing = addMsg("typing", "Aan het werk... (dit kan even duren)");

  try {
    let res;
    if (!conversationId) {
      res = await fetch("/conversations", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ tenant_id: tenantSel.value, message: text }),
      });
    } else {
      res = await fetch(`/conversations/${conversationId}/messages`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });
    }
    typing.remove();
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      addMsg("system", "Fout (" + res.status + "): " + (err.detail || "onbekend"));
    } else {
      const data = await res.json();
      conversationId = data.conversation_id;
      addMsg("assistant", data.reply);
    }
  } catch (e) {
    typing.remove();
    addMsg("system", "Netwerkfout: " + e.message);
  } finally {
    send.disabled = false; input.disabled = false; input.focus();
  }
}

send.addEventListener("click", sendMessage);
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
tenantSel.addEventListener("change", () => {
  conversationId = null;
  addMsg("system", "Nieuwe klant gekozen, nieuw gesprek gestart.");
  addMsg("assistant", "Waar wil je dat ik de nieuwsbrief over schrijf?");
});

loadTenants();
</script>
</body>
</html>
